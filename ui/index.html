<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>短影音字幕提取工具</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Loading Screen -->
  <div class="loading-screen" id="loadingScreen">
    <div aria-label="Orange and tan hamster running in a metal wheel" role="img" class="wheel-and-hamster">
      <div class="wheel"></div>
      <div class="hamster">
        <div class="hamster__body">
          <div class="hamster__head">
            <div class="hamster__ear"></div>
            <div class="hamster__eye"></div>
            <div class="hamster__nose"></div>
          </div>
          <div class="hamster__limb hamster__limb--fr"></div>
          <div class="hamster__limb hamster__limb--fl"></div>
          <div class="hamster__limb hamster__limb--br"></div>
          <div class="hamster__limb hamster__limb--bl"></div>
          <div class="hamster__tail"></div>
        </div>
      </div>
      <div class="spoke"></div>
    </div>
    <p class="loading-text">載入中...</p>
  </div>

  <div class="app" id="appMain" style="display:none">
    <!-- Header -->
    <header class="header">
      <div class="header-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/>
          <line x1="7" y1="2" x2="7" y2="22"/>
          <line x1="17" y1="2" x2="17" y2="22"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <line x1="2" y1="7" x2="7" y2="7"/>
          <line x1="2" y1="17" x2="7" y2="17"/>
          <line x1="17" y1="7" x2="22" y2="7"/>
          <line x1="17" y1="17" x2="22" y2="17"/>
        </svg>
      </div>
      <h1>短影音字幕提取工具</h1>
      <div style="flex:1"></div>
      <button class="btn-settings" id="btnSettings" title="設定">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <!-- Main Content -->
    <main class="main">
      <!-- Drop Zone -->
      <div class="drop-zone" id="dropZone">
        <div class="drop-zone-content">
          <svg class="drop-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <p class="drop-text">拖放影片檔案至此處</p>
          <p class="drop-hint">或點擊選擇檔案</p>
          <p class="drop-formats">支援格式：MP4、MOV、AVI、MKV、WebM、FLV</p>
        </div>

      </div>

      <!-- Selected File -->
      <div class="file-info" id="fileInfo" style="display:none">
        <div class="file-badge">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="23 7 16 12 23 17 23 7"/>
            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
          </svg>
          <span id="fileName">-</span>
          <button class="btn-clear" id="clearFile" title="移除檔案">&times;</button>
        </div>
      </div>

      <!-- Settings -->
      <div class="settings-wrapper">
        <span class="settings-wrapper-title">Settings</span>
        <div class="settings-grid">
        <!-- Language -->
        <div class="setting-card">
          <label class="setting-label">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="2" y1="12" x2="22" y2="12"/>
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
            語音語言
          </label>
          <select id="language" class="setting-select">
            <option value="auto">自動偵測</option>
            <option value="zh">中文</option>
            <option value="en">英文</option>
            <option value="ja">日文</option>
            <option value="ko">韓文</option>
          </select>
        </div>

        <!-- Output Format -->
        <div class="setting-card">
          <label class="setting-label">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
            輸出格式
          </label>
          <select id="outputFormat" class="setting-select">
            <option value="srt">SRT</option>
            <option value="ass">ASS</option>
            <option value="txt">TXT（純文字）</option>
            <option value="all" selected>全部輸出</option>
          </select>
        </div>

        <!-- Gemini Correction -->
        <div class="setting-card">
          <label class="setting-label">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
            AI 校正
          </label>
          <div class="toggle-wrapper">
            <label class="toggle">
              <input type="checkbox" id="useGemini" checked>
              <span class="toggle-slider"></span>
            </label>
            <span class="toggle-label" id="geminiLabel">已啟用</span>
          </div>
        </div>

        <!-- Translation -->
        <div class="setting-card">
          <label class="setting-label">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 8l6 6"/>
              <path d="M4 14l6-6 2-3"/>
              <path d="M2 5h12"/>
              <path d="M7 2h1"/>
              <path d="M22 22l-5-10-5 10"/>
              <path d="M14 18h6"/>
            </svg>
            翻譯字幕
          </label>
          <select id="translateTo" class="setting-select">
            <option value="">不翻譯</option>
            <option value="en">英文</option>
            <option value="ja">日文</option>
            <option value="ko">韓文</option>
            <option value="zh-CN">簡體中文</option>
          </select>
        </div>
        <!-- Output Directory -->
        <div class="setting-card setting-card-full">
          <label class="setting-label">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
            輸出目錄
          </label>
          <div class="dir-picker">
            <span class="dir-path" id="outputDirDisplay">與影片同目錄</span>
            <button class="btn-dir" id="pickOutputDir" title="選擇輸出目錄">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                <line x1="12" y1="11" x2="12" y2="17"/>
                <polyline points="9 14 12 11 15 14"/>
              </svg>
            </button>
            <button class="btn-dir" id="clearOutputDir" title="重設為與影片同目錄">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
      </div>

      <!-- Start Button -->
      <button class="btn-start" id="btnStart" disabled>
        <div class="dots_border"></div>
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="sparkle">
          <path class="path" stroke-linejoin="round" stroke-linecap="round" stroke="black" fill="black" d="M14.187 8.096L15 5.25L15.813 8.096C16.0231 8.83114 16.4171 9.50062 16.9577 10.0413C17.4984 10.5819 18.1679 10.9759 18.903 11.186L21.75 12L18.904 12.813C18.1689 13.0231 17.4994 13.4171 16.9587 13.9577C16.4181 14.4984 16.0241 15.1679 15.814 15.903L15 18.75L14.187 15.904C13.9769 15.1689 13.5829 14.4994 13.0423 13.9587C12.5016 13.4181 11.8321 13.0241 11.097 12.814L8.25 12L11.096 11.187C11.8311 10.9769 12.5006 10.5829 13.0413 10.0423C13.5819 9.50162 13.9759 8.83214 14.186 8.097L14.187 8.096Z"></path>
          <path class="path" stroke-linejoin="round" stroke-linecap="round" stroke="black" fill="black" d="M6 14.25L5.741 15.285C5.59267 15.8785 5.28579 16.4206 4.85319 16.8532C4.42059 17.2858 3.87853 17.5927 3.285 17.741L2.25 18L3.285 18.259C3.87853 18.4073 4.42059 18.7142 4.85319 19.1468C5.28579 19.5794 5.59267 20.1215 5.741 20.715L6 21.75L6.259 20.715C6.40725 20.1216 6.71398 19.5796 7.14639 19.147C7.5788 18.7144 8.12065 18.4075 8.714 18.259L9.75 18L8.714 17.741C8.12065 17.5925 7.5788 17.2856 7.14639 16.853C6.71398 16.4204 6.40725 15.8784 6.259 15.285L6 14.25Z"></path>
          <path class="path" stroke-linejoin="round" stroke-linecap="round" stroke="black" fill="black" d="M6.5 4L6.303 4.5915C6.24777 4.75718 6.15472 4.90774 6.03123 5.03123C5.90774 5.15472 5.75718 5.24777 5.5915 5.303L5 5.5L5.5915 5.697C5.75718 5.75223 5.90774 5.84528 6.03123 5.96877C6.15472 6.09226 6.24777 6.24282 6.303 6.4085L6.5 7L6.697 6.4085C6.75223 6.24282 6.84528 6.09226 6.96877 5.96877C7.09226 5.84528 7.24282 5.75223 7.4085 5.697L8 5.5L7.4085 5.303C7.24282 5.24777 7.09226 5.15472 6.96877 5.03123C6.84528 4.90774 6.75223 4.75718 6.697 4.5915L6.5 4Z"></path>
        </svg>
        <span class="text_button">開始提取字幕</span>
      </button>

      <!-- Progress -->
      <div class="progress-section" id="progressSection" style="display:none">
        <div class="progress-loader" id="pacmanLoader">
          <div class="loader-wrapper">
            <div class="packman"></div>
            <div class="dots">
              <div class="dot"></div>
              <div class="dot"></div>
              <div class="dot"></div>
              <div class="dot"></div>
            </div>
          </div>
        </div>
        <div class="progress-bar-container">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <p class="progress-text" id="progressText">準備中...</p>
      </div>

      <!-- Log Output -->
      <div class="log-section" id="logSection" style="display:none">
        <div class="log-header">
          <span>處理日誌</span>
          <button class="btn-icon" id="toggleLog" title="收合/展開">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>
          <button class="btn-icon" id="btnExportLog" title="複製日誌">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
          </button>
          <button class="btn-icon" id="btnSaveLog" title="儲存日誌到檔案">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          </button>
        </div>
        <div class="log-content" id="logContent"></div>
      </div>
    </main>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
      <div class="modal">
        <div class="modal-header">
          <h2>設定</h2>
          <button class="btn-close" id="closeSettings">&times;</button>
        </div>
        <div class="modal-body">
          <!-- Tabs -->
          <div class="tabs">
            <button class="tab active" data-tab="appearance">外觀</button>
            <button class="tab" data-tab="output">輸出</button>
            <button class="tab" data-tab="log">日誌</button>
            <button class="tab" data-tab="api">API</button>
          </div>

          <!-- Appearance Tab -->
          <div class="tab-content active" id="tab-appearance">
            <div class="setting-row">
              <label class="setting-row-label">介面主題</label>
              <div class="theme-picker">
                <button class="theme-btn active" data-theme="dark">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                  深色
                </button>
                <button class="theme-btn" data-theme="light">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                  淺色
                </button>
              </div>
            </div>
            <div class="setting-row">
              <label class="setting-row-label">字體大小</label>
              <div class="font-size-control">
                <button class="font-btn" id="fontDecrease">A-</button>
                <span class="font-size-value" id="fontSizeValue">14</span>
                <button class="font-btn" id="fontIncrease">A+</button>
              </div>
            </div>
          </div>

          <!-- Output Tab -->
          <div class="tab-content" id="tab-output">
            <div class="setting-row">
              <label class="setting-row-label">預設輸出目錄</label>
              <div class="dir-picker-row">
                <span class="dir-path-display" id="settingsOutputDir">未設定（與影片同目錄）</span>
                <button class="btn-detect" id="pickSettingsOutputDir">選擇</button>
                <button class="btn-detect btn-reset" id="clearSettingsOutputDir">重設</button>
              </div>
              <p class="api-hint">留空則輸出至影片所在目錄</p>
            </div>
          </div>

          <!-- Log Tab -->
          <div class="tab-content" id="tab-log">
            <div class="setting-row">
              <label class="setting-row-label">自動匯出日誌</label>
              <div class="toggle-wrapper">
                <label class="toggle">
                  <input type="checkbox" id="logAutoExport">
                  <span class="toggle-slider"></span>
                </label>
                <span class="toggle-label" id="logAutoExportLabel">已停用</span>
              </div>
            </div>
            <div class="setting-row">
              <label class="setting-row-label">匯出格式</label>
              <select class="setting-select" id="logExportFormat">
                <option value="txt">純文字 (TXT)</option>
                <option value="json">JSON</option>
              </select>
            </div>
            <div class="setting-row">
              <label class="setting-row-label">日誌匯出目錄</label>
              <div class="dir-picker-row">
                <span class="dir-path-display" id="settingsLogDir">未設定（與輸出目錄相同）</span>
                <button class="btn-detect" id="pickSettingsLogDir">選擇</button>
                <button class="btn-detect btn-reset" id="clearSettingsLogDir">重設</button>
              </div>
              <p class="api-hint">留空則使用輸出目錄</p>
            </div>
          </div>

          <!-- API Tab -->
          <div class="tab-content" id="tab-api">
            <div class="setting-row">
              <label class="setting-row-label">API 模式</label>
              <select class="setting-select" id="apiMode">
                <option value="proxy">Proxy（代理伺服器）</option>
                <option value="official">Official（Google Gemini API）</option>
              </select>
            </div>
            <div class="setting-row">
              <label class="setting-row-label">Base URL</label>
              <input type="text" class="setting-input" id="apiBaseUrl" placeholder="http://localhost:8317/v1">
            </div>
            <div class="setting-row">
              <label class="setting-row-label">API Key</label>
              <input type="password" class="setting-input" id="apiKey" placeholder="your-api-key">
            </div>
            <div class="setting-row">
              <label class="setting-row-label">模型</label>
              <div style="display:flex;gap:8px;align-items:center">
                <select class="setting-select" id="apiModel" style="flex:1">
                  <option value="">-- 點擊「偵測」載入模型 --</option>
                </select>
                <button class="btn-detect" id="detectModels">偵測</button>
              </div>
            </div>
            <p class="api-hint" id="apiHint"></p>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-cancel" id="cancelSettings">取消</button>
          <button class="btn-save" id="saveSettings">儲存</button>
        </div>
      </div>
    </div>
  </div>

  <script src="boot.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
