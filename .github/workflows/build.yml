name: Build Windows Portable

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: npm install

      - name: Download ffmpeg
        run: |
          curl -L -o ffmpeg.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
          7z x ffmpeg.zip -o"ffmpeg-temp"
          mkdir -p src-tauri/bin
          cp ffmpeg-temp/ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe src-tauri/bin/ffmpeg.exe

      - name: Build whisper.cpp
        run: |
          git clone --depth 1 https://github.com/ggerganov/whisper.cpp.git whisper-build
          cd whisper-build
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DWHISPER_BUILD_TESTS=OFF
          cmake --build build --config Release
          cp build/bin/Release/whisper-cli.exe ../src-tauri/bin/whisper-cpp.exe

      - name: Download whisper model
        run: |
          mkdir -p src-tauri/models
          curl -L -o src-tauri/models/ggml-small.bin https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small.bin

      - name: Build Tauri app
        run: npx tauri build --no-bundle

      - name: Package portable zip
        run: |
          mkdir -p dist/subtitle-tool/bin
          mkdir -p dist/subtitle-tool/models
          cp src-tauri/target/release/subtitle-tool.exe dist/subtitle-tool/
          cp src-tauri/bin/ffmpeg.exe dist/subtitle-tool/bin/
          cp src-tauri/bin/whisper-cpp.exe dist/subtitle-tool/bin/
          cp src-tauri/models/ggml-small.bin dist/subtitle-tool/models/
          cd dist && 7z a -tzip ../subtitle-tool-windows.zip subtitle-tool/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: subtitle-tool-windows
          path: subtitle-tool-windows.zip
          retention-days: 30

      - name: Create or update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "字幕提取工具 - 最新版"
          body: |
            ## 使用方式
            1. 下載 `subtitle-tool-windows.zip`
            2. 解壓縮到任意資料夾
            3. 雙擊 `subtitle-tool.exe` 啟動
            4. 在設定中填入 Gemini API Key
            5. 拖入影片即可產生字幕

            ## 包含內容
            - `subtitle-tool.exe` - 主程式
            - `bin/ffmpeg.exe` - 音訊處理
            - `bin/whisper-cpp.exe` - 語音辨識
            - `models/ggml-small.bin` - 辨識模型

            > 支援中文資料夾路徑，不需要安裝任何額外軟體。
          files: subtitle-tool-windows.zip
          make_latest: true
          prerelease: false
