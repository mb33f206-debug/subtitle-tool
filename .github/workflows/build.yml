name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: npm install

      - name: Download ffmpeg
        run: |
          curl -L -o ffmpeg.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
          7z x ffmpeg.zip -o"ffmpeg-temp"
          mkdir -p src-tauri/bin
          cp ffmpeg-temp/ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe src-tauri/bin/ffmpeg.exe

      - name: Build whisper.cpp
        run: |
          git clone --depth 1 https://github.com/ggerganov/whisper.cpp.git whisper-build
          cd whisper-build
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DWHISPER_BUILD_TESTS=OFF
          cmake --build build --config Release
          cp build/bin/Release/whisper-cli.exe ../src-tauri/bin/whisper-cpp.exe

      - name: Download whisper model
        run: |
          mkdir -p src-tauri/models
          curl -L -o src-tauri/models/ggml-small.bin https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small.bin

      - name: Build Tauri app
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: subtitle-tool-windows-installer
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: subtitle-tool-windows-portable
          path: |
            src-tauri/target/release/subtitle-tool.exe
            src-tauri/bin/ffmpeg.exe
            src-tauri/bin/whisper-cpp.exe
            src-tauri/models/ggml-small.bin
          retention-days: 30
